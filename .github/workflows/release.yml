name: Release

# Triggered by a v* tag push. Builds a source tarball, regenerates
# the conformity-artifact set, generates a SLSA L2 build-provenance
# attestation through Sigstore (keyless OIDC, published to the Rekor
# transparency log), and attaches the tarball plus the whole
# conformity pack to a new GitHub release.
#
# Consumer-side verification of a downloaded tarball:
#
#   gh attestation verify capa_cra_template-<tag>.tar.gz --owner <you>

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write       # create release + upload assets
  id-token: write       # Sigstore OIDC for keyless signing
  attestations: write   # publish SLSA provenance attestation

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout tag
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3
        with:
          fetch-depth: 0
          ref: ${{ github.ref }}

      - name: Verify tag is GPG-signed by the pinned publisher key
        run: |
          set -euo pipefail
          # Anchor on the pinned primary-key fingerprint. A merely
          # "valid" signature is not enough: the tag must be signed by
          # THIS publisher. Any deviation (no key, wrong key, unsigned
          # tag, signature by a different key) fails the release.
          PINNED=6C1D222D491FB88031E041A536CFB426101AA24B
          if [ ! -f publisher.asc ]; then
            echo "::error::publisher.asc is missing; cannot verify the tag signature."
            exit 1
          fi
          gpg --import publisher.asc
          if ! gpg --with-colons --fingerprint \
               | grep -q "^fpr:::::::::${PINNED}:"; then
            echo "::error::publisher.asc does not contain the pinned fingerprint ${PINNED}."
            exit 1
          fi
          SIGNER=$(git verify-tag --raw "${GITHUB_REF_NAME}" 2>&1 \
                   | awk '/^\[GNUPG:\] VALIDSIG/ { print $NF }')
          if [ "${SIGNER}" != "${PINNED}" ]; then
            echo "::error::tag ${GITHUB_REF_NAME} is not signed by the pinned key (got '${SIGNER}', want '${PINNED}')."
            exit 1
          fi
          echo "Tag ${GITHUB_REF_NAME} verified against pinned publisher key ${PINNED}."

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: "3.12"

      - name: Install Capa toolchain (pinned tag)
        run: |
          python -m pip install --upgrade pip
          # capa-language v1.5.0
          pip install "git+https://github.com/nelsonduarte/capa-language.git@0af79c0d55a56c78d9cc89129c9526c9cd7df5d6"

      - name: Derive the reproducible-build epoch from the tagged commit
        run: |
          # Pin the build timestamp to the tagged commit's committer date
          # (Unix UTC seconds) so the conformity pack attached to this
          # release is byte-for-byte reproducible: anyone who checks out
          # the tag and reruns these commands gets identical bytes.
          #
          # Deriving the epoch from HEAD is NOT circular: the artifacts
          # are release assets, never committed, so the tagged commit
          # already exists and is immutable when the release runs. %ct is
          # a property of that fixed commit. (The fetch-depth: 0 checkout
          # above carries full history; the tip commit alone is read.)
          echo "SOURCE_DATE_EPOCH=$(git show -s --format=%ct HEAD)" >> "$GITHUB_ENV"

      - name: Generate conformity artifacts
        run: |
          capa --cyclonedx  main.capa > sbom.cyclonedx.json
          capa --spdx       main.capa > sbom.spdx.json
          capa --vex        main.capa > vex.json
          capa --provenance main.capa > provenance.json
          capa --manifest   main.capa > manifest.json

      - name: Build source tarball
        id: tarball
        run: |
          NAME="${GITHUB_REPOSITORY##*/}-${GITHUB_REF_NAME}"
          git archive --format=tar.gz --prefix="${NAME}/" HEAD > "${NAME}.tar.gz"
          SHA256=$(sha256sum "${NAME}.tar.gz" | cut -d' ' -f1)
          echo "name=${NAME}.tar.gz" >> "$GITHUB_OUTPUT"
          echo "sha256=${SHA256}" >> "$GITHUB_OUTPUT"

      - name: Generate SLSA L2 provenance for the tarball
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32  # v4.1.0
        with:
          subject-path: ${{ steps.tarball.outputs.name }}

      - name: Publish release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda  # v3.0.0
        with:
          files: |
            ${{ steps.tarball.outputs.name }}
            sbom.cyclonedx.json
            sbom.spdx.json
            vex.json
            provenance.json
            manifest.json
          generate_release_notes: false
          body: |
            Conformity release of `${{ github.event.repository.name }}`.

            **Tarball:** `${{ steps.tarball.outputs.name }}`
            **SHA-256:** `${{ steps.tarball.outputs.sha256 }}`

            ## Attached conformity pack

            - `sbom.cyclonedx.json` / `sbom.spdx.json`: SBOM emitted by
              the Capa compiler, including the per-function authority set
              and the provably-excluded capabilities.
            - `vex.json`: VEX exclusions (CRA Annex I vulnerability
              handling).
            - `provenance.json`: source-level build provenance.
            - SLSA L2 build provenance for the tarball, attested through
              Sigstore Rekor.

            ## Verification

            ```
            gh attestation verify ${{ steps.tarball.outputs.name }} \
                --owner ${{ github.repository_owner }}
            ```

            See `SECURITY.md` and `docs/CRA-mapping.md`.
